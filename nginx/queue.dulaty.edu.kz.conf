# ─── Лимиты для высокой нагрузки ──────────────────────────────────────────────
# Добавь в nginx.conf (http блок):
#   worker_processes auto;
#   events { worker_connections 4096; use epoll; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream spring_backend {
    server 127.0.0.1:8080;
    keepalive 128;
}

server {
    listen 80;
    server_name queue.dulaty.edu.kz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name queue.dulaty.edu.kz;

    # SSL — укажи свои пути
    ssl_certificate     /etc/ssl/queue.dulaty.edu.kz/fullchain.pem;
    ssl_certificate_key /etc/ssl/queue.dulaty.edu.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Общие заголовки ────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── WebSocket / SockJS ────────────────────────────────────────────────────
    # Все пути SockJS: /api/ws-sockjs, /api/ws-sockjs/info, /api/ws-sockjs/xxx/yyy/websocket
    location /api/ws-sockjs {
        proxy_pass         http://spring_backend/ws-sockjs;
        proxy_http_version 1.1;

        # Обязательно для WebSocket Upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Долгое соединение — не разрывать heartbeat
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;

        # Отключить буферизацию — данные должны идти сразу
        proxy_buffering off;
    }

    # ── REST API ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://spring_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── Фронтенд (React build) ─────────────────────────────────────────────────
    location / {
        root  /var/www/queue.dulaty.edu.kz;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Кеш статики
        location ~* \.(js|css|png|jpg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
