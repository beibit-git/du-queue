stages:
  - deploy

# ── Ручной job: задеплоить Nginx конфиг и перезагрузить Nginx ─────────────────
deploy-nginx:
  stage: deploy
  tags: [du_queue]
  when: manual
  script:
    - |
      docker run --rm \
        -v /etc/sudoers.d:/etc/sudoers.d \
        alpine sh -c "echo 'gitlab-runner ALL=(ALL) NOPASSWD: /usr/sbin/nginx, /bin/systemctl reload nginx, /bin/systemctl restart nginx' > /etc/sudoers.d/gitlab-runner-nginx && chmod 440 /etc/sudoers.d/gitlab-runner-nginx"
    - |
      docker run --rm \
        -v "${CI_PROJECT_DIR}/nginx/queue.dulaty.edu.kz.conf:/tmp/nginx.conf:ro" \
        -v /etc/nginx:/etc/nginx \
        alpine sh -c "rm -rf /etc/nginx/sites-available/queue.dulaty.edu.kz.conf && cp /tmp/nginx.conf /etc/nginx/sites-available/queue.dulaty.edu.kz.conf && ln -sf /etc/nginx/sites-available/queue.dulaty.edu.kz.conf /etc/nginx/sites-enabled/queue.dulaty.edu.kz.conf"
    - sudo nginx -t
    - sudo systemctl reload nginx
    - echo "Nginx обновлён"
  only:
    - main

# ── Ручной job: добавить SSH ключ для прямого доступа к серверу ───────────────
add-ssh-access:
  stage: deploy
  tags: [du_queue]
  when: manual
  script:
    - mkdir -p $HOME/.ssh && chmod 700 $HOME/.ssh
    - echo "$MY_PUBLIC_KEY" | tee -a $HOME/.ssh/authorized_keys
    - chmod 600 $HOME/.ssh/authorized_keys
    - cat /etc/ssh/sshd_config.d/50-cloud-init.conf
  only:
    - main

deploy:
  stage: deploy
  tags: [du_queue]
  before_script:
    - 'which ssh-agent || (apt-get update -y && apt-get install -y openssh-client git)'
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - eval "$(ssh-agent -s)"
    # 1) добавляем приватный ключ из переменной GitLab CI/CD: SSH_PRIVATE_KEY
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - >/dev/null
    # 2) refresh known_hosts для GitLab SSH
    - touch ~/.ssh/known_hosts
    - ssh-keygen -R gitlab.dulaty.kz -f ~/.ssh/known_hosts || true
    - ssh-keyscan -H -t ed25519 gitlab.dulaty.kz >> ~/.ssh/known_hosts
    # 3) диагностика: показать какие ключи загружены (без секретов)
    - ssh-add -l
    # 4) проверка соединения с GitLab по SSH (должно вывести "Welcome to GitLab, @<user>" и выйти)
    - ssh -o StrictHostKeyChecking=yes -T git@gitlab.dulaty.kz || true
  script:
    - echo "Деплой на сервер..."
    - cd /home/gitlab-runner/du-queue/
    - git remote -v                      # ПРОВЕРЬ, что origin = git@gitlab.dulaty.kz:<group>/<repo>.git
    - git pull                           # теперь должно пройти
    - echo "Содержимое директории:"
    - ls -ltah /home/gitlab-runner/du-queue/
    - if docker compose ps | grep "Up"; then
      echo "Контейнеры уже запущены. Перезапуск...";
      docker compose restart;
      else
      echo "Контейнеры не запущены. Запуск...";
      docker compose up -d;
      fi
    - docker volume ls
    - mvn clean package
    - echo "Удаление старого контейнера и образа..."
    - docker rm -f $(docker ps -aq --filter "ancestor=openjdk") || true
    - docker build -t openjdk .
    - docker run --network="host" --restart=always -d --name openjdk-container openjdk || docker restart openjdk-container
    - docker ps
  only:
    - main
