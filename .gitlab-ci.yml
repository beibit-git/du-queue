stages:
  - cleanup
  - deploy

cleanup-root-files:
  stage: cleanup
  tags: [du_queue]
  variables:
    GIT_STRATEGY: none
  script:
    - docker run --rm -v /home/gitlab-runner/builds/LhrTeWj-v/0/developers/du-queue:/workspace alpine sh -c "rm -rf /workspace/nginx"
    - echo "Cleanup done"
  only:
    - main

deploy:
  stage: deploy
  tags: [du_queue]
  before_script:
    - 'which ssh-agent || (apt-get update -y && apt-get install -y openssh-client git)'
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - >/dev/null
    - touch ~/.ssh/known_hosts
    - ssh-keygen -R gitlab.dulaty.kz -f ~/.ssh/known_hosts || true
    - ssh-keyscan -H -t ed25519 gitlab.dulaty.kz >> ~/.ssh/known_hosts
    - ssh-add -l
    - ssh -o StrictHostKeyChecking=yes -T git@gitlab.dulaty.kz || true
  script:
    - echo "=== Деплой приложения ==="
    - cd /home/gitlab-runner/du-queue/
    - git remote -v
    - git pull
    - ls -ltah /home/gitlab-runner/du-queue/
    - if docker compose ps | grep "Up"; then
      echo "Контейнеры уже запущены. Перезапуск...";
      docker compose restart;
      else
      echo "Контейнеры не запущены. Запуск...";
      docker compose up -d;
      fi
    - docker volume ls
    - mvn clean package
    - echo "Удаление старого контейнера и образа..."
    - docker rm -f $(docker ps -aq --filter "ancestor=openjdk") || true
    - docker build -t openjdk .
    - docker run --network="host" --restart=always -d --name openjdk-container openjdk || docker restart openjdk-container
    - docker ps

    - echo "=== Настройка Nginx WebSocket ==="
    # Шаг 1 — добавить sudo права напрямую в sudoers.d
    - |
      echo 'gitlab-runner ALL=(ALL) NOPASSWD: /usr/sbin/nginx, /bin/systemctl, /usr/bin/python3, /usr/bin/tee' \
        | sudo tee /etc/sudoers.d/gitlab-runner-nginx > /dev/null || \
      docker run --rm -v /etc/sudoers.d:/etc/sudoers.d alpine sh -c \
        "echo 'gitlab-runner ALL=(ALL) NOPASSWD: /usr/sbin/nginx, /bin/systemctl, /usr/bin/python3, /usr/bin/tee' \
        > /etc/sudoers.d/gitlab-runner-nginx && chmod 440 /etc/sudoers.d/gitlab-runner-nginx"
    # Шаг 2 — записать Python-скрипт патча в /tmp (права не нужны)
    - |
      cat > /tmp/nginx_ws_patch.py << 'PYEOF'
      import re, sys
      cfg = '/etc/nginx/sites-available/default'
      try:
          with open(cfg) as f:
              c = f.read()
      except Exception as e:
          print(f'ERROR reading {cfg}: {e}')
          sys.exit(1)

      # Удаляем старый ws-блок если есть
      c = re.sub(r'\n[ \t]*location[\s\^~]+/api/ws\b[^{]*\{[^}]*\}', '', c)

      ws = """
          location ^~ /api/ws {
              proxy_pass http://127.0.0.1:8080;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_read_timeout 3600s;
              proxy_send_timeout 3600s;
              proxy_buffering off;
          }

      """

      m = re.search(r'[ \t]*location /api/ \{', c)
      if not m:
          print('WARN: location /api/ not found, printing config:')
          print(c[:1000])
          sys.exit(0)

      patched = c.replace(m.group(), ws + m.group())
      print(patched)
      PYEOF
    # Шаг 3 — запустить патч: читает конфиг, выводит изменённый, sudo tee записывает обратно
    - sudo python3 /tmp/nginx_ws_patch.py | sudo tee /etc/nginx/sites-available/default > /dev/null
    # Шаг 4 — проверить и перезагрузить nginx
    - sudo nginx -t && sudo systemctl reload nginx && echo "=== Nginx reload OK ===" || echo "=== Nginx reload FAILED ==="
  only:
    - main
